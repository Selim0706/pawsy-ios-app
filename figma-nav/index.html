<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pawsy Nav Bar</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Display", "Avenir Next", sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #bfe8d9 0%, #c8eddc 100%);
    }
    .frame {
      width: 520px;
      height: 230px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 24px;
    }
    .nav-wrap {
      position: relative;
      width: 470px;
      height: 120px;
      border-radius: 36px;
      background: #f8f6f0;
      border: 2px solid rgba(255,255,255,.8);
      box-shadow: 0 10px 24px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.7);
    }
    .brand {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      padding: 7px 22px;
      border-radius: 999px;
      background: #bfe9d7;
      border: 2px solid rgba(255,255,255,.85);
      box-shadow: 0 5px 12px rgba(0,0,0,.12);
      font-weight: 700;
      font-size: 22px;
      line-height: 1;
      color: #111;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .items {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      top: 28px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
    }
    .item {
      text-align: center;
      color: #62696e;
      font-size: 31px;
      line-height: 1;
    }
    .item span {
      display: block;
      font-size: 31px;
      margin-bottom: 7px;
    }
    .item label {
      font-size: 32px;
      font-weight: 500;
      color: #717171;
      letter-spacing: 0;
    }
    .active span, .active label { color: #111; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="nav-wrap">
      <div class="brand"><span>🐾</span><span>Pawsy</span></div>
      <div class="items">
        <div class="item active"><span>⌂</span><label>Home</label></div>
        <div class="item"><span>🗓</span><label>Calendar</label></div>
        <div class="item"><span>💬</span><label>AI Chat</label></div>
        <div class="item"><span>◌</span><label>Profile</label></div>
      </div>
    </div>
  </div>
</body>
</html>
