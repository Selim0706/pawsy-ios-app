name: Petapp
options:
  deploymentTarget:
    iOS: 17.0
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.salimbaghirzade.petapp
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    DEVELOPMENT_TEAM: ""
configs:
  Debug: debug
  Release: release
targets:
  Petapp:
    type: application
    platform: iOS
    sources:
      - path: Petapp
        excludes:
          - "**/*.legacy"
    resources:
      - path: Petapp/Assets.xcassets
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Allow selecting photos to analyze pet safety."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Allow saving pet photos."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
    scheme:
      testTargets:
        - PetappTests
        - PetappUITests
  PetappTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PetappTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Petapp
  PetappUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PetappUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Petapp
